<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>𝟻𝟶𝟻</title>
  <link rel="icon" type="image/x-icon" href="disco-removebg-preview.png">

  <style>
    body {
      margin: 0;
      padding: 0;

      background-image: url("505.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;

      min-height: 100vh;
      position: relative;
    }

    .conteudo {
      text-align: center;
      margin-top: 40px;
    }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      background-color: white;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      margin-top: 20px;
    }

    /* ✨ SUA PARTE INTERATIVA */
    .cabeçalho img {
      width: 250px; /* ajusta se quiser */
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .cabeçalho img:hover {
      transform: translateY(-10px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* opcional: posicionar melhor na tela */
    .cabeçalho {
      position: absolute;
      top: 50px;
      left: 50px;
    }

  </style>
</head>

<body>

  <div class="cabeçalho">
    <a href="https://open.spotify.com/intl-pt/album/1XkGORuUX2QGOEIL4EbJKm?si=WaFh28V4Sgu-rn9_cbhz6w">
      <img src="arcticmonkeys.png" alt="album">
    </a>
  </div>

</body>
</html>
