    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
        }

        div { 
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* CARROSSEL */
        .carousel {
            width: 100%;
            overflow: hidden;
            margin-top: 20px;
        }

        .carousel-track {
            display: flex;
            width: max-content;
            animation: scroll 25s linear infinite;
        }

        /* PAUSA no hover */
        .carousel:hover .carousel-track {
            animation-play-state: paused;
        }

        /* PAUSA no toque */
        .carousel:active .carousel-track {
            animation-play-state: paused;
        }

        .carousel img {
            width: 250px;
            height: 250px;
            margin-right: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .carousel img:hover {
            transform: scale(1.05);
        }

        @keyframes scroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        .card {
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: white;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            margin-top: 20px;
        }

        form {
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
